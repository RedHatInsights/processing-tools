name: Python tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'

      coverage:
        description: 'Check the code coverage'
        type: boolean
        default: true

      coverage_threshold:
        description: 'Minimum coverage percentage (0-100)'
        required: false
        type: number
        default: 0

      cov_branch:
        description: 'Enable branch coverage measurement (adds --cov-branch to pytest)'
        required: false
        type: boolean
        default: false

      packages:
        description: 'Package or directory to measure coverage for (passed to --cov). Defaults to current directory.'
        required: false
        type: string
        default: '.'

jobs:
  pytests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Python tests
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pytest pytest-cov
          pip install '.[test]'

      - name: Unit tests
        if: inputs.coverage != true
        run: pytest

      - name: Unit tests with coverage
        if: inputs.coverage == true
        run: pytest --cov=${{ inputs.packages }} --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=${{ inputs.coverage_threshold }} ${{ inputs.cov_branch && '--cov-branch' || '' }}

      - name: Push coverage report to Codecov
        if: inputs.coverage == true && inputs.python_version == '3.11'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit-tests
          files: coverage.xml
          fail_ci_if_error: false
